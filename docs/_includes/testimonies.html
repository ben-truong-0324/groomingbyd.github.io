<section class="testimonies-section" id="testimonies">
    <h2 class="section-title">Grooming Gallery <i class="fas fa-camera"></i></h2>
        
    <div class="photo-grid-scroll">
        {% for i in (1..13) %}
        <div class="testimony-card">
            <img src="{{ '/groomingbyd.github.io/assets/images/gbd' | append: i | append: '.jpg' | relative_url }}" 
                 style="width:100%; height:250px; border-radius:10px; object-fit:cover; margin-bottom: 15px; border: 2px solid var(--black);" 
                 alt="Grooming by Dee Transformation">
            <!-- <div class="stars" style="color: var(--neon-pink);">★★★★★</div> -->
            <p class="client-name" style="margin-top: auto; color: var(--black);">Fresh & Clean</p>
        </div>
        {% endfor %}
    </div>
</section>
